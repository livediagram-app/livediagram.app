name = "livediagram-router"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Service bindings to the marketing and live apps.
# The `service` values must match the deployed Worker names of each downstream app.
# Production wiring is TBD — these placeholders will be revisited when the apps
# are first deployed. See specs/08-router-app.md.

[[services]]
binding = "MARKETING"
service = "livediagram-marketing"

[[services]]
binding = "LIVE"
service = "livediagram-live"

[[services]]
binding = "API"
service = "livediagram-api"

[[services]]
binding = "TELEMETRY"
service = "livediagram-telemetry"

[[services]]
binding = "HELP"
service = "livediagram-help"

# Local dev (`wrangler dev --env local --port 3000`, the workspace `dev`
# script): service bindings can't reach the local Next dev servers, so this
# environment defines none and sets plain HTTP origins instead. The worker
# falls back to proxying these when a binding is absent. See spec/08.
[env.local.vars]
MARKETING_ORIGIN = "http://127.0.0.1:3001"
LIVE_ORIGIN = "http://127.0.0.1:3002"
API_ORIGIN = "http://127.0.0.1:8787"
TELEMETRY_ORIGIN = "http://127.0.0.1:3003"
HELP_ORIGIN = "http://127.0.0.1:3004"
