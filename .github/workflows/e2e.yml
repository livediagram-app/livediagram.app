name: E2E Smoke

# Browser E2E (spec/72) is deliberately OFF the per-PR critical path —
# it costs a browser download + a running stack. The fast unit gate
# (ci.yml) still runs on every PR/push. This runs:
#   - on push to main (a post-merge smoke), and
#   - on demand (workflow_dispatch) against a branch before merge.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Chromium smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser binary keyed by the installed
      # version, so the ~120 MB download happens once per version bump,
      # not per run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(pnpm --filter @livediagram/live exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Chromium
        run: pnpm --filter @livediagram/live exec playwright install --with-deps chromium

      # Build the live app the way production does — a clean env with no
      # NEXT_PUBLIC_API_BASE / Clerk keys, so it calls same-origin `/api`
      # (the e2e stack proxies it) and runs in guest mode.
      - name: Build live app
        run: pnpm --filter @livediagram/live build

      # Playwright's webServer boots scripts/e2e-stack.mjs (api worker on
      # local D1 + the static serve). CI=1 makes it always start fresh.
      - name: Run smoke suite
        run: pnpm --filter @livediagram/live test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/live/playwright-report
          retention-days: 7
